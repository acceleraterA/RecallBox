services:
  postgres:
    image: postgres:16
    container_name: recallbox-postgres
    environment:
      POSTGRES_DB: recallbox
      POSTGRES_USER: recallbox
      POSTGRES_PASSWORD: recallbox
    ports:
      - "5433:5432"
    volumes:
      - recallbox-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recallbox -d recallbox"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  recallbox-postgres-data:
